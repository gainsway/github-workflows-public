name: publish nuget packages to github packages

on:
  workflow_call:
    inputs:
      dotnet-version:
        required: true
        type: string
        default: '9.0.x'
    secrets:
      NUGET_TOKEN:
        required: true

jobs:
  validate-tag:
    name: Validate Tag
    if: startsWith(github.ref, 'refs/tags')
    uses: gainsway/github-workflows-public/.github/workflows/job.validate-tag.yml@main

  publish:
    runs-on: ubuntu-latest
    needs: validate-tag
    if: |
      always() &&
      (needs.validate-tag.result == 'success' || needs.validate-tag.result == 'skipped')
    outputs:
      version: ${{ steps.gitversion.outputs.SemVer }}
      commitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}
    env:
      GITHUB_OWNER: gainsway
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4
        with:
          versionSpec: '6.x'
          includePrerelease: true

      - name: Determine Version
        uses: gittools/actions/gitversion/execute@v4
        id: gitversion # step id used as reference for output values
        with:
          overrideConfig: |
            tag-prefix: v

      - name: Display GitVersion outputs
        run: |
          echo "Version: ${{ steps.gitversion.outputs.SemVer }}"
          echo "CommitsSinceVersionSource: ${{ steps.gitversion.outputs.CommitsSinceVersionSource }}"

      - name: Configure Nuget sources
        run: dotnet nuget add source --username $GITHUB_OWNER --password ${{ secrets.NUGET_TOKEN }} --store-password-in-clear-text --name github "https://nuget.pkg.github.com/$GITHUB_OWNER/index.json"

      - name: Package
        run: dotnet pack -p:Version='${{ steps.gitversion.outputs.fullSemVer }}' -c Release --output Publish

      - name: Extract package name
        id: package
        shell: bash
        run: |
          package_file=$(find Publish -maxdepth 1 -type f -name '*.nupkg' ! -name '*.symbols.nupkg' | head -n 1)
          if [[ -z "$package_file" ]]; then
            echo "No package found in Publish" >&2
            exit 1
          fi

          package_name=$(unzip -p "$package_file" '*.nuspec' | sed -n 's:.*<id>\(.*\)</id>.*:\1:p' | head -n 1)
          if [[ -z "$package_name" ]]; then
            echo "Could not extract package name from $package_file" >&2
            exit 1
          fi

          echo "package-name=$package_name" >> "$GITHUB_OUTPUT"

      - name: Push package to GitHub packages
        run: dotnet nuget push "Publish/*.nupkg" --api-key ${{ secrets.NUGET_TOKEN }} --source "github" --skip-duplicate

      - name: Clean up old pre-release package versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          owner: ${{ env.GITHUB_OWNER }}
          package-name: ${{ steps.package.outputs.package-name }}
          package-type: nuget
          token: ${{ secrets.NUGET_TOKEN }}
          min-versions-to-keep: 10
          delete-only-pre-release-versions: 'true'
